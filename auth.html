<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>敏感操作验证</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        --bg: #f4f6f9;
        --panel: #ffffff;
        --line: #d8dee9;
        --text: #132238;
        --muted: #5d6b82;
        --accent: #1f6feb;
        --danger: #d64545;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 360px;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      body {
        display: grid;
        place-items: center;
        padding: 16px;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        padding: 20px 18px 18px;
        display: grid;
        gap: 14px;
      }

      .auth-row {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
      }

      .auth-icon {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: #e8f1ff;
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .hint {
        color: var(--muted);
      }

      .status {
        color: var(--accent);
        font-weight: 600;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 2px solid rgba(31, 111, 235, 0.18);
        border-top-color: var(--accent);
        animation: spin 0.85s linear infinite;
        margin-top: 8px;
      }

      #status.error,
      .status.error {
        color: var(--danger);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="auth-row">
        <div class="auth-icon" aria-hidden="true">钥</div>
        <div>
          <h1>敏感操作验证</h1>
          <p class="hint" id="message">正在调用插件通行密钥，验证完成后会自动返回。</p>
        </div>
      </div>
      <div class="spinner" aria-hidden="true"></div>
      <p id="status" class="status" role="status" aria-live="polite">准备验证中...</p>
    </main>
    <script type="module" src="/assets/auth.js"></script>
  </body>
</html>
